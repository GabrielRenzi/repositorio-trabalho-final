name: CI Pipeline Streaming Edu

# define que o workflow será acionado a cada push
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # faz o checkout do código do repositório para a máquina virtual
    - name: Checkout do código
      uses: actions/checkout@v3

    # configura o ambiente de execução com Python 3.10
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # instala as dependências listadas no requirements.txt
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # etapa adicion onde análise estática de código (Lint) usando flake8
    - name: Rodar Linter (Flake8)
      run: |
        flake8 api/ --count --select=E9,F63,F7,F82 --show-source --statistics
        
    # etapa que executa os testes unitários utilizando pytest
    - name: Rodar Testes Unitários
      run: |
        pytest api/tests/